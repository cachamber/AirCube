name: Firmware CI

"on":
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize ESP-IDF environment
        shell: bash
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh
          echo "/opt/esp/idf/tools:$PATH"
          idf.py --version
          
      - name: Build firmware (ESP32-H2)
        shell: bash
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py set-target esp32h2
          idf.py build
