name: Firmware Build and Release

"on":
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.semver.outputs.base_version }}
      next_version: ${{ steps.semver.outputs.next_version }}
      release_version: ${{ steps.semver.outputs.release_version }}
      release_tag: ${{ steps.semver.outputs.release_tag }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
      make_latest: ${{ steps.semver.outputs.make_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: semver
        shell: bash
        run: ./.github/scripts/compute_semver.sh "${{ github.ref_name }}" "${{ github.run_number }}"

  build-firmware:
    runs-on: ubuntu-latest
    needs: prepare-version
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set firmware version for this build
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ needs.prepare-version.outputs.release_version }}" > firmware/version.txt
          cat firmware/version.txt
          
      - name: Initialize ESP-IDF environment
        shell: bash
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh
          echo "/opt/esp/idf/tools:$PATH"
          idf.py --version
  
      - name: Build firmware (ESP32-H2)
        shell: bash
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh
          cd firmware
          idf.py set-target esp32h2
          idf.py build

      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          cp firmware/build/AirCube.bin "out/AirCube_firmware_v${{ needs.prepare-version.outputs.release_version }}.bin"
          cp firmware/build/bootloader/bootloader.bin "out/bootloader_v${{ needs.prepare-version.outputs.release_version }}.bin"
          cp firmware/build/partition_table/partition-table.bin "out/partition-table_v${{ needs.prepare-version.outputs.release_version }}.bin"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ needs.prepare-version.outputs.release_version }}
          path: out/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build-firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ needs.prepare-version.outputs.release_version }}
          path: out

      - name: Generate grouped release notes
        shell: bash
        run: |
          set -euo pipefail
          ./.github/scripts/generate_release_notes.sh "${{ needs.prepare-version.outputs.release_version }}" "${{ github.ref_name }}" "${{ needs.prepare-version.outputs.base_version }}" "${{ github.sha }}"

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-version.outputs.release_tag }}
          name: Firmware ${{ needs.prepare-version.outputs.release_version }}
          artifacts: out/*.bin
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          bodyFile: RELEASE_NOTES.md
          prerelease: ${{ needs.prepare-version.outputs.prerelease }}
          makeLatest: ${{ needs.prepare-version.outputs.make_latest }}
